name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a tag like 'v1.0.0'

permissions:
  contents: write # Required for creating GitHub Releases

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (Statically linked via musl to avoid glibc issues)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: fexpress
            asset_name: fexpress-linux-amd64
          
          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: fexpress
            asset_name: fexpress-macos-amd64
            
          # macOS (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fexpress
            asset_name: fexpress-macos-arm64
            
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fexpress.exe
            asset_name: fexpress-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Required for compiling statically linked Linux binaries
      - name: Install musl-tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build project
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset for release
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
